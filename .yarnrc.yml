nodeLinker: node-modules
defaultSemverRangePrefix: ''
npmRegistryServer: 'https://registry.npmjs.org'
npmAuditRegistry: 'https://registry.npmjs.org'

# 7 days expressed in minutes. Using an explicit numeric value avoids
# ambiguity across tooling while preserving the intended age gate.
npmMinimalAgeGate: 10080
npmPreapprovedPackages:
  - '@next/*'
  - '@babel/plugin-transform-modules-systemjs@7.29.4'
  - 'axios@1.16.0'
  - 'basic-ftp@5.3.1'
  - 'defu@6.1.7'
  - 'effect@3.21.0'
  - 'express-rate-limit@8.3.2'
  - 'fast-uri@3.1.2'
  - 'fast-xml-parser@5.7.3'
  - 'flatted@3.4.2'
  - 'follow-redirects@1.16.0'
  - '@hapi/content@6.0.2'
  - '@hapi/pez@6.1.1'
  - '@hapi/subtext@8.1.2'
  - '@hono/node-server@1.19.14'
  - 'glob@10.5.0'
  - 'handlebars@4.7.9'
  - 'form-data@4.0.6'
  - 'hono@4.12.27'
  - 'immutable@5.1.5'
  - 'jsonwebtoken@9.0.3'
  - 'koa@3.2.0'
  - 'lodash@4.18.1'
  - 'minimatch@3.1.5'
  - 'minimatch@5.1.9'
  - 'minimatch@9.0.9'
  - 'minimatch@10.2.5'
  - 'next@16.2.6'
  - 'http-proxy-middleware@3.0.7'
  - 'nodemailer@9.0.3'
  - 'path-expression-matcher@1.5.0'
  - 'path-to-regexp@0.1.13'
  - 'path-to-regexp@8.4.2'
  - 'picomatch@2.3.2'
  - 'picomatch@4.0.4'
  - 'rollup@4.60.1'
  - 'serialize-javascript@7.0.5'
  - 'storybook@8.6.17'
  - 'strnum@2.2.3'
  - '@storybook/core-server@8.6.17'
  - '@storybook/react@8.6.17'
  - '@storybook/react-vite@8.6.17'
  - '@storybook/test@8.6.17'
  - 'svgo@2.8.1'
  - 'svgo@3.3.3'
  - 'ts-jest@29.4.9'
  - 'tmp@0.2.7'
  - 'validator@13.15.22'
  - 'vercel@50.1.1'
  - 'vite@6.4.3'
  - 'ws@8.21.0'

# @nx/express still declares express ^4; backend intentionally runs Express 5.
# Yarn cannot override existing peer ranges via packageExtensions — discard the noise.
logFilters:
  - code: YN0060
    level: discard
    text: '@nx/express'

enableHardenedMode: true
enableScripts: true
checksumBehavior: throw
