nodeLinker: node-modules
defaultSemverRangePrefix: ''
npmRegistryServer: 'https://registry.npmjs.org'
npmAuditRegistry: 'https://registry.npmjs.org'

# 7 days expressed in minutes. Using an explicit numeric value avoids
# ambiguity across tooling while preserving the intended age gate.
npmMinimalAgeGate: 10080
npmPreapprovedPackages:
  - '@nestjs/common@11.1.19'
  - '@nestjs/core@11.1.19'
  - '@nestjs/platform-express@11.1.19'
  - '@nestjs/testing@11.1.19'
  - '@next/*'
  - 'axios@1.15.0'
  - 'basic-ftp@5.2.2'
  - 'defu@6.1.7'
  - 'effect@3.21.0'
  - 'express-rate-limit@8.3.2'
  - 'fast-xml-parser@5.5.12'
  - 'flatted@3.4.2'
  - '@hapi/content@6.0.1'
  - '@hapi/pez@6.1.1'
  - '@hapi/subtext@8.1.2'
  - '@hono/node-server@1.19.14'
  - 'glob@10.5.0'
  - 'handlebars@4.7.9'
  - 'hono@4.12.12'
  - 'immutable@5.1.5'
  - 'jsonwebtoken@9.0.3'
  - 'koa@3.2.0'
  - 'lodash@4.18.1'
  - 'minimatch@3.1.5'
  - 'minimatch@5.1.9'
  - 'minimatch@9.0.9'
  - 'minimatch@10.2.5'
  - 'next@16.2.3'
  - 'nodemailer@8.0.5'
  - 'path-expression-matcher@1.5.0'
  - 'path-to-regexp@0.1.13'
  - 'path-to-regexp@8.4.2'
  - 'picomatch@2.3.2'
  - 'picomatch@4.0.4'
  - 'rollup@4.60.1'
  - 'serialize-javascript@7.0.5'
  - 'storybook@8.6.17'
  - 'strnum@2.2.3'
  - '@storybook/core-server@8.6.17'
  - '@storybook/react@8.6.17'
  - '@storybook/react-vite@8.6.17'
  - '@storybook/test@8.6.17'
  - 'svgo@2.8.1'
  - 'svgo@3.3.3'
  - 'ts-jest@29.4.9'
  - 'validator@13.15.22'
  - 'vercel@41.7.8'
  - 'vite@6.4.2'

enableHardenedMode: true
enableScripts: true
checksumBehavior: throw
