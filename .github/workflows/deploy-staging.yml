name: Deploy Staging

on:
  workflow_run:
    workflows: ['CI']
    types: [completed]
    branches: [main]

concurrency:
  group: deploy-staging
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  prepare-dependencies:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    name: Prepare Dependency Cache
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Setup Node.js 22
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '22'

      - name: Restore dependency cache
        id: dependency-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            .yarn/install-state.gz
            node_modules
          key: ${{ runner.os }}-node-22-deps-${{ hashFiles('yarn.lock', 'package.json', '.yarnrc.yml', 'apps/**/package.json', 'libs/**/package.json') }}

      - name: Install dependencies
        if: steps.dependency-cache.outputs.cache-hit != 'true'
        run: corepack yarn install --immutable

      - name: Verify frozen lockfile
        if: steps.dependency-cache.outputs.cache-hit != 'true'
        run: git diff --exit-code -- yarn.lock

  deploy-backend:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    needs: prepare-dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: staging

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Setup Node.js 22
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '22'

      - name: Restore dependency cache
        id: dependency-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            .yarn/install-state.gz
            node_modules
          key: ${{ runner.os }}-node-22-deps-${{ hashFiles('yarn.lock', 'package.json', '.yarnrc.yml', 'apps/**/package.json', 'libs/**/package.json') }}

      - name: Install dependencies
        if: steps.dependency-cache.outputs.cache-hit != 'true'
        run: corepack yarn install --immutable

      - name: Verify frozen lockfile
        if: steps.dependency-cache.outputs.cache-hit != 'true'
        run: git diff --exit-code -- yarn.lock

      - name: Package backend (cPanel)
        run: corepack yarn package:backend:api

      - name: Deploy backend to cPanel (staging)
        uses: samkirkland/ftp-deploy-action@a51268f67f6605236975928ae28b0f7e9971d50a # v4.3.6
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/deploy/backend-api/
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          timeout: 300000

  deploy-frontend:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    needs: [prepare-dependencies, deploy-backend]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: staging

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Setup Node.js 22
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '22'

      - name: Restore dependency cache
        id: dependency-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            .yarn/install-state.gz
            node_modules
          key: ${{ runner.os }}-node-22-deps-${{ hashFiles('yarn.lock', 'package.json', '.yarnrc.yml', 'apps/**/package.json', 'libs/**/package.json') }}

      - name: Install dependencies
        if: steps.dependency-cache.outputs.cache-hit != 'true'
        run: corepack yarn install --immutable

      - name: Verify frozen lockfile
        if: steps.dependency-cache.outputs.cache-hit != 'true'
        run: git diff --exit-code -- yarn.lock

      - name: Deploy frontend to Vercel (staging)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          # This workflow deploys to a dedicated Vercel staging project.
          # In that project we intentionally use the production environment
          # for the staging app, so `--environment=production` and `--prod`
          # are both expected here.
          # See VERCEL_FRONTEND_HOSTING.md and CI_CD_AND_RELEASE_PROCESS.md.
          #
          # Nx recommends keeping the Vercel project's Root Directory at the
          # workspace root and setting the Build Command to `npx nx build myorganizer --prod`.
          set -euo pipefail
          VERCEL_CLI_VERSION='41.7.8'

          corepack yarn dlx -p "vercel@${VERCEL_CLI_VERSION}" vercel pull --yes --environment=production --token "$VERCEL_TOKEN"

          echo '--- Vercel diagnostics (sanitized) ---'
          if [ -d .vercel ]; then
            echo 'Vercel metadata files (names only):'
            find .vercel -maxdepth 2 -type f -print
          else
            echo 'No .vercel directory found after vercel pull.'
          fi

          node <<'NODE'
            const fs = require('fs');
            const path = '.vercel/project.json';
            if (!fs.existsSync(path)) {
              console.log('No .vercel/project.json found (nothing to report).');
              process.exit(0);
            }

            const raw = JSON.parse(fs.readFileSync(path, 'utf8'));
            const settings = raw.settings || {};

            const sanitized = {
              projectId: raw.projectId,
              orgId: raw.orgId,
              settings: {
                framework: settings.framework,
                rootDirectory: settings.rootDirectory,
                installCommand: settings.installCommand,
                buildCommand: settings.buildCommand,
                outputDirectory: settings.outputDirectory,
                nodeVersion: settings.nodeVersion,
              },
            };

            console.log(JSON.stringify(sanitized, null, 2));
          NODE

          echo 'NOTE: Not printing any .vercel/.env* files to avoid leaking secrets.'
          echo '--- end Vercel diagnostics ---'

          # Avoid `--prebuilt`: prebuilt bundles can fail in monorepos when
          # file-trace references point outside the uploaded artifact set.
          corepack yarn dlx -p "vercel@${VERCEL_CLI_VERSION}" vercel deploy --prod --yes --token "$VERCEL_TOKEN"
