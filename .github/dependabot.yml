version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: daily
      time: '06:00'
      timezone: UTC
    cooldown:
      default-days: 14
      semver-major-days: 14
      semver-minor-days: 14
      semver-patch-days: 14
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - security
    commit-message:
      prefix: deps
    allow:
      - dependency-type: direct
      - dependency-type: indirect
    groups:
      npm-production:
        dependency-type: production
        update-types:
          - minor
          - patch
      npm-development:
        dependency-type: development
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      time: '06:30'
      timezone: UTC
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - security
      - github-actions
    commit-message:
      prefix: ci
