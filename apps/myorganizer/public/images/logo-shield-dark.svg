<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 244 52" fill="none" role="img" aria-label="MyOrganizer logo">
  <title>MyOrganizer</title>
  <defs>
    <linearGradient id="shield-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#0F766E"/>
    </linearGradient>
  </defs>

  <!-- Shield body -->
  <path d="M26 4 C17 4 8 8.5 8 18 L8 28 C8 38.5 17 44 26 47 C35 44 44 38.5 44 28 L44 18 C44 8.5 35 4 26 4 Z"
        fill="url(#shield-grad)"/>

  <!-- Checklist row 1: checked -->
  <rect x="13.5" y="16.5" width="6.5" height="6.5" rx="1.3" fill="none" stroke="white" stroke-width="1.4"/>
  <path d="M14.7 19.7 L16.5 21.5 L20 17.5"
        stroke="white" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <line x1="22.5" y1="19.8" x2="37" y2="19.8"
        stroke="white" stroke-opacity="0.75" stroke-width="1.4" stroke-linecap="round"/>

  <!-- Checklist row 2: checked -->
  <rect x="13.5" y="25.5" width="6.5" height="6.5" rx="1.3" fill="none" stroke="white" stroke-width="1.4"/>
  <path d="M14.7 28.7 L16.5 30.5 L20 26.5"
        stroke="white" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <line x1="22.5" y1="28.8" x2="35" y2="28.8"
        stroke="white" stroke-opacity="0.75" stroke-width="1.4" stroke-linecap="round"/>

  <!-- Checklist row 3: pending (adds depth) -->
  <rect x="13.5" y="34.5" width="6.5" height="6.5" rx="1.3" fill="none" stroke="white" stroke-opacity="0.45" stroke-width="1.4"/>
  <line x1="22.5" y1="37.8" x2="31" y2="37.8"
        stroke="white" stroke-opacity="0.35" stroke-width="1.4" stroke-linecap="round"/>

  <!-- Wordmark: "My" in muted weight, "Organizer" bold — white text for dark backgrounds -->
  <text x="57" y="34"
        font-family="'Plus Jakarta Sans', 'Inter', ui-sans-serif, system-ui, sans-serif"
        font-size="22" font-weight="600" fill="#F8FAFC" letter-spacing="-0.4">My</text>
  <text x="82" y="34"
        font-family="'Plus Jakarta Sans', 'Inter', ui-sans-serif, system-ui, sans-serif"
        font-size="22" font-weight="800" fill="#F8FAFC" letter-spacing="-0.5">Organizer</text>
</svg>
