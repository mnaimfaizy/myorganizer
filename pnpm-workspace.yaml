packages:
  - 'apps/*'
  - 'libs/*'
  - 'libs/web/pages/*'
  - 'tools/*'

packageManagerStrict: false
savePrefix: ''
minimumReleaseAge: 20160
blockExoticSubdeps: true
strictDepBuilds: true
allowBuilds:
  '@prisma/client': true
  '@prisma/engines': true
  '@swc/core': true
  bcrypt: true
  esbuild: true
  fsevents: true
  sharp: true
  unrs-resolver: true
